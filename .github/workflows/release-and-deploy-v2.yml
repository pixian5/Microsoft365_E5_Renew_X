name: Release And Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create and publish, for example v0.2.0.25
        required: true
        type: string
      deploy_hf:
        description: Also sync the Hugging Face Space
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-and-deploy-main
  cancel-in-progress: true

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Release Tag
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            release_tag="${{ inputs.release_tag }}"
          else
            version="$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' workspace/research/E5Renewer.Net/Directory.Build.props | head -n 1)"
            if [[ -z "${version}" ]]; then
              echo "Failed to resolve version from Directory.Build.props" >&2
              exit 1
            fi

            release_tag="v${version#v}"
          fi

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Create Or Update Release Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          target_sha="$(git rev-parse HEAD)"
          git tag -f "${{ steps.vars.outputs.release_tag }}" "${target_sha}"
          git push origin "refs/tags/${{ steps.vars.outputs.release_tag }}" --force

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Prepare Scripts
        run: chmod +x workspace/scripts/*.sh

      - name: Build Publish Bundle
        env:
          PUBLISH_RUNTIME: linux-x64
          PUBLISH_SELF_CONTAINED: "false"
        run: workspace/scripts/publish.sh

      - name: Archive Publish Bundle
        run: |
          release_tag="${{ steps.vars.outputs.release_tag }}"
          release_version="${release_tag#v}"
          mkdir -p workspace/build/artifacts
          tar -C workspace/build/publish -czf "workspace/build/artifacts/Microsoft365_E5_Renew_X-${release_tag}.tar.gz" .
          cp "workspace/build/artifacts/Microsoft365_E5_Renew_X-${release_tag}.tar.gz" "workspace/build/artifacts/Microsoft365_E5_Renew_X-latest.tar.gz"
          printf '%s\n' "${release_version}" > "workspace/build/artifacts/release-version.txt"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.release_tag }}
          generate_release_notes: true
          files: |
            workspace/build/artifacts/Microsoft365_E5_Renew_X-${{ steps.vars.outputs.release_tag }}.tar.gz
            workspace/build/artifacts/Microsoft365_E5_Renew_X-latest.tar.gz
            workspace/build/artifacts/release-version.txt

      - name: Wait For Release Assets To Be Reachable
        if: github.event_name == 'push' || inputs.deploy_hf
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.vars.outputs.release_tag }}
        run: |
          release_tag="${RELEASE_TAG}"
          expected_version="${release_tag#v}"
          bundle_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_tag}/Microsoft365_E5_Renew_X-${release_tag}.tar.gz"
          version_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_tag}/release-version.txt"
          curl_args=(--connect-timeout 10 --max-time 20 --retry 2 --retry-delay 2)
          deadline=$((SECONDS + 300))
          attempt=0

          while (( SECONDS < deadline )); do
            attempt=$((attempt + 1))
            if curl "${curl_args[@]}" -fsSIL "$bundle_url" >/dev/null 2>&1; then
              actual_version="$(curl "${curl_args[@]}" -fsSL "$version_url" 2>/dev/null | tr -d '\r\n' || true)"
              if [[ "$actual_version" == "$expected_version" ]]; then
                echo "Release assets are ready. bundle_url=$bundle_url version=$actual_version (attempt ${attempt})"
                exit 0
              fi
            fi

            echo "Release assets are not reachable yet, retrying... (attempt ${attempt})"
            sleep 5
          done

          echo "Release assets for ${release_tag} were not reachable within 300 seconds." >&2
          exit 1

      - name: Setup Python For Hugging Face
        if: github.event_name == 'push' || inputs.deploy_hf
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update Hugging Face Space Secrets
        if: github.event_name == 'push' || inputs.deploy_hf
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
          USER_SECRET_JSON: ${{ secrets.USER_SECRET_JSON }}
          USER_SECRET_JSON_B64: ${{ secrets.USER_SECRET_JSON_B64 }}
          TOKEN_TXT: ${{ secrets.TOKEN_TXT }}
          TOKEN_TXT_B64: ${{ secrets.TOKEN_TXT_B64 }}
        run: |
          if [[ -z "${HF_TOKEN:-}" || -z "${HF_SPACE_ID:-}" ]]; then
            echo "HF_TOKEN or HF_SPACE_ID is not configured, skipping Space secrets sync."
            exit 0
          fi

          python -m pip install --disable-pip-version-check --quiet "huggingface_hub>=0.30,<1"
          python <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ.get("HF_TOKEN", "").strip()
          repo_id = os.environ.get("HF_SPACE_ID", "").strip()
          if not token or not repo_id:
              raise SystemExit(0)

          api = HfApi(token=token)
          secret_names = [
              "USER_SECRET_JSON",
              "USER_SECRET_JSON_B64",
              "TOKEN_TXT",
              "TOKEN_TXT_B64",
          ]

          updated = []
          for secret_name in secret_names:
              value = os.environ.get(secret_name, "")
              if value:
                  api.add_space_secret(repo_id=repo_id, key=secret_name, value=value)
                  updated.append(secret_name)

          if updated:
              print(f"Updated Space secrets: {', '.join(updated)}")
          else:
              print("No runtime secrets provided from GitHub Secrets, skipped Space secret update.")
          PY

      - name: Sync Hugging Face Space
        if: github.event_name == 'push' || inputs.deploy_hf
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
          RELEASE_TAG: ${{ steps.vars.outputs.release_tag }}
          HF_COMMIT_MESSAGE: Deploy ${{ steps.vars.outputs.release_tag }} from GitHub Actions
        run: |
          if [[ -z "${HF_TOKEN:-}" || -z "${HF_SPACE_ID:-}" ]]; then
            echo "HF_TOKEN or HF_SPACE_ID is not configured, skipping HF deployment."
            exit 0
          fi

          chmod +x workspace/scripts/*.sh
          workspace/scripts/sync-hf-space.sh

      - name: Wait For Hugging Face Runtime Update
        if: github.event_name == 'push' || inputs.deploy_hf
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
          RELEASE_TAG: ${{ steps.vars.outputs.release_tag }}
        run: |
          if [[ -z "${HF_SPACE_ID:-}" || -z "${HF_TOKEN:-}" ]]; then
            echo "HF_TOKEN or HF_SPACE_ID is not configured, skipping HF runtime polling."
            exit 0
          fi

          space_api_url="https://huggingface.co/api/spaces/${HF_SPACE_ID}"
          health_url="https://${HF_SPACE_ID//\//-}.hf.space/healthz"
          expected_version="${RELEASE_TAG#v}"
          curl_args=(--connect-timeout 5 --max-time 10)
          soft_restart_attempted=0
          factory_reboot_attempted=0
          final_factory_reboot_attempted=0
          deadline=$((SECONDS + 2700))
          attempt=0

          fetch_runtime_state() {
            local raw
            raw="$(curl "${curl_args[@]}" -fsSL "$space_api_url" 2>/dev/null || true)"
            if [[ -z "$raw" ]]; then
              printf 'unknown unknown unknown'
              return 0
            fi

            printf '%s' "$raw" | python -c 'import json,sys; data=json.load(sys.stdin); runtime=data.get("runtime", {}); print(data.get("sha",""), runtime.get("sha",""), runtime.get("stage",""))'
          }

          fetch_health_version() {
            local raw
            raw="$(curl "${curl_args[@]}" -fsSL "$health_url" 2>/dev/null || true)"
            if [[ -z "$raw" ]]; then
              return 0
            fi

            printf '%s' "$raw" | python -c 'import json,sys; raw=sys.stdin.read().strip(); print(json.loads(raw).get("version","") if raw else "")' 2>/dev/null || true
          }

          request_space_restart() {
            local factory="${1:-false}"
            local restart_url="https://huggingface.co/api/spaces/${HF_SPACE_ID}/restart"
            local label="restart"
            if [[ "$factory" == "true" ]]; then
              restart_url+="?factory=true"
              label="factory reboot"
            fi

            local response
            response="$(curl "${curl_args[@]}" -fsSL -X POST -H "Authorization: Bearer ${HF_TOKEN}" "$restart_url" 2>/dev/null || true)"
            if [[ -n "$response" ]]; then
              printf '%s' "$response" | python -c "import json,sys; data=json.load(sys.stdin); print('Requested ${label}. stage=%s runtime_sha=%s' % (data.get('stage', 'unknown'), data.get('sha', 'unknown')))"
            else
              echo "Failed to request HF ${label}; the API did not return a response."
            fi
          }

          while (( SECONDS < deadline )); do
            attempt=$((attempt + 1))
            read -r repo_sha runtime_sha runtime_stage <<< "$(fetch_runtime_state)"
            health_version="$(fetch_health_version)"
            echo "HF runtime stage: ${runtime_stage:-unknown}, repo sha: ${repo_sha:-unknown}, runtime sha: ${runtime_sha:-unknown}, health version: ${health_version:-unknown} (attempt ${attempt}, elapsed ${SECONDS}s)"
            if [[ "${health_version}" == "${expected_version}" ]]; then
              exit 0
            fi

            if [[ "$soft_restart_attempted" -eq 0 && "$SECONDS" -ge 300 ]]; then
              echo "HF runtime is still not serving ${expected_version} after ${SECONDS} seconds. Requesting one regular restart."
              request_space_restart false
              soft_restart_attempted=1
            fi

            if [[ "$factory_reboot_attempted" -eq 0 && "$SECONDS" -ge 900 ]]; then
              echo "HF runtime is still not serving ${expected_version} after ${SECONDS} seconds. Requesting one factory reboot."
              request_space_restart true
              factory_reboot_attempted=1
            fi

            if [[ "$final_factory_reboot_attempted" -eq 0 && "$SECONDS" -ge 1800 ]]; then
              echo "HF runtime is still not serving ${expected_version} after ${SECONDS} seconds. Requesting one final factory reboot."
              request_space_restart true
              final_factory_reboot_attempted=1
            fi

            sleep 5
          done

          echo "HF app health endpoint did not report the requested release version ${expected_version} within 2700 seconds." >&2
          exit 1

      - name: Dump Hugging Face Runtime Logs On Failure
        if: failure() && (github.event_name == 'push' || inputs.deploy_hf)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          if [[ -z "${HF_TOKEN:-}" || -z "${HF_SPACE_ID:-}" ]]; then
            echo "HF_TOKEN or HF_SPACE_ID is not configured, skipping HF failure logs dump."
            exit 0
          fi

          curl_args=(--connect-timeout 10 --max-time 20 --retry 1 --retry-delay 2)

          echo "===== HF runtime ====="
          curl "${curl_args[@]}" -fsSL -H "Authorization: Bearer ${HF_TOKEN}" "https://huggingface.co/api/spaces/${HF_SPACE_ID}/runtime" || true
          echo

          echo "===== HF healthz ====="
          curl "${curl_args[@]}" -fsSL "https://${HF_SPACE_ID//\//-}.hf.space/healthz" || true
          echo

          echo "===== HF build logs ====="
          curl "${curl_args[@]}" -fsSL -H "Authorization: Bearer ${HF_TOKEN}" "https://huggingface.co/api/spaces/${HF_SPACE_ID}/logs/build" | sed -n '1,240p' || true
          echo

          echo "===== HF run logs ====="
          curl "${curl_args[@]}" -fsSL -H "Authorization: Bearer ${HF_TOKEN}" "https://huggingface.co/api/spaces/${HF_SPACE_ID}/logs/run" | sed -n '1,240p' || true
          echo
