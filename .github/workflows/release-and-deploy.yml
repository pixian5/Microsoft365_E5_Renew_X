name: Release And Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create and publish, for example v0.2.0.25
        required: true
        type: string
      deploy_hf:
        description: Also sync the Hugging Face Space
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Release Tag
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            release_tag="${{ inputs.release_tag }}"
          else
            version="$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' workspace/research/E5Renewer.Net/Directory.Build.props | head -n 1)"
            if [[ -z "${version}" ]]; then
              echo "Failed to resolve version from Directory.Build.props" >&2
              exit 1
            fi

            release_tag="v${version#v}"
          fi

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Create Or Update Release Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ steps.vars.outputs.release_tag }}" "${GITHUB_SHA}"
          git push origin "refs/tags/${{ steps.vars.outputs.release_tag }}" --force

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Prepare Scripts
        run: chmod +x workspace/scripts/*.sh

      - name: Build Publish Bundle
        run: workspace/scripts/publish.sh

      - name: Archive Publish Bundle
        run: |
          mkdir -p workspace/build/artifacts
          tar -C workspace/build/publish -czf "workspace/build/artifacts/Microsoft365_E5_Renew_X-${{ steps.vars.outputs.release_tag }}.tar.gz" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.release_tag }}
          generate_release_notes: true
          files: |
            workspace/build/artifacts/Microsoft365_E5_Renew_X-${{ steps.vars.outputs.release_tag }}.tar.gz

      - name: Setup Python For Hugging Face
        if: github.event_name == 'push' || inputs.deploy_hf
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update Hugging Face Space Secrets
        if: github.event_name == 'push' || inputs.deploy_hf
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
          USER_SECRET_JSON: ${{ secrets.USER_SECRET_JSON }}
          USER_SECRET_JSON_B64: ${{ secrets.USER_SECRET_JSON_B64 }}
          TOKEN_TXT: ${{ secrets.TOKEN_TXT }}
          TOKEN_TXT_B64: ${{ secrets.TOKEN_TXT_B64 }}
        run: |
          if [[ -z "${HF_TOKEN:-}" || -z "${HF_SPACE_ID:-}" ]]; then
            echo "HF_TOKEN or HF_SPACE_ID is not configured, skipping Space secrets sync."
            exit 0
          fi

          python -m pip install --disable-pip-version-check --quiet "huggingface_hub>=0.30,<1"
          python <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ.get("HF_TOKEN", "").strip()
          repo_id = os.environ.get("HF_SPACE_ID", "").strip()
          if not token or not repo_id:
              raise SystemExit(0)

          api = HfApi(token=token)
          secret_names = [
              "USER_SECRET_JSON",
              "USER_SECRET_JSON_B64",
              "TOKEN_TXT",
              "TOKEN_TXT_B64",
          ]

          updated = []
          for secret_name in secret_names:
              value = os.environ.get(secret_name, "")
              if value:
                  api.add_space_secret(repo_id=repo_id, key=secret_name, value=value)
                  updated.append(secret_name)

          if updated:
              print(f"Updated Space secrets: {', '.join(updated)}")
          else:
              print("No runtime secrets provided from GitHub Secrets, skipped Space secret update.")
          PY

      - name: Sync Hugging Face Space
        if: github.event_name == 'push' || inputs.deploy_hf
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
          HF_COMMIT_MESSAGE: Deploy ${{ steps.vars.outputs.release_tag }} from GitHub Actions
        run: |
          if [[ -z "${HF_TOKEN:-}" || -z "${HF_SPACE_ID:-}" ]]; then
            echo "HF_TOKEN or HF_SPACE_ID is not configured, skipping HF deployment."
            exit 0
          fi

          chmod +x workspace/scripts/*.sh
          workspace/scripts/sync-hf-space.sh

      - name: Restart Hugging Face Space
        if: github.event_name == 'push' || inputs.deploy_hf
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          if [[ -z "${HF_TOKEN:-}" || -z "${HF_SPACE_ID:-}" ]]; then
            echo "HF_TOKEN or HF_SPACE_ID is not configured, skipping HF restart."
            exit 0
          fi

          python <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ.get("HF_TOKEN", "").strip()
          repo_id = os.environ.get("HF_SPACE_ID", "").strip()
          if not token or not repo_id:
              raise SystemExit(0)

          api = HfApi(token=token)
          api.restart_space(repo_id=repo_id, factory_reboot=True)
          print(f"Triggered Hugging Face Space factory reboot for {repo_id}")
          PY

      - name: Wait For Hugging Face Runtime Update
        if: github.event_name == 'push' || inputs.deploy_hf
        env:
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          if [[ -z "${HF_SPACE_ID:-}" ]]; then
            echo "HF_SPACE_ID is not configured, skipping HF runtime polling."
            exit 0
          fi

          space_api_url="https://huggingface.co/api/spaces/${HF_SPACE_ID}"
          for attempt in {1..18}; do
            read -r repo_sha runtime_sha runtime_stage <<EOF
$(curl -fsSL "$space_api_url" | python -c 'import json,sys; data=json.load(sys.stdin); print(data.get("sha",""), data.get("runtime",{}).get("sha",""), data.get("runtime",{}).get("stage",""))')
EOF
            echo "HF runtime stage: ${runtime_stage}, repo sha: ${repo_sha}, runtime sha: ${runtime_sha} (attempt ${attempt}/18)"
            if [[ -n "${repo_sha}" && "${runtime_stage}" == "RUNNING" && "${runtime_sha}" == "${repo_sha}" ]]; then
              exit 0
            fi

            sleep 10
          done

          echo "HF runtime did not switch to the requested Space revision within the polling window." >&2
          exit 1
